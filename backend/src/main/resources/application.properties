# ─── Server ──────────────────────────────────────────────
server.port=8080

# ─── Database ────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/dssshop_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ─────────────────────────────────────────────────
app.jwt.secret=dssshop_super_secret_key_that_is_at_least_256_bits_long_for_hmac_sha256
app.jwt.expiration=86400000

# ─── CORS ────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ─── File Upload ─────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ─── Stripe ──────────────────────────────────────────────
stripe.api.key=sk_test_your_stripe_key_here
stripe.webhook.secret=whsec_your_webhook_secret_here

# ─── Logging ─────────────────────────────────────────────
logging.level.com.dssshop=DEBUG
logging.level.org.springframework.security=WARN
